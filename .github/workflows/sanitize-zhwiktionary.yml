name: Sanitize zhwiktionary Dict

on:
  push:
    branches:
      - main
    paths:
      - 'cn_dicts/zhwiktionary.dict.yaml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sanitize:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Remove bare-initial m entries
        run: |
          awk -F'\t' 'NF>=2 {
            n = split($2, s, " ");
            bad = 0;
            for (i = 1; i <= n; i++) if (s[i] == "m") bad = 1;
            if (!bad) print;
          }' cn_dicts/zhwiktionary.dict.yaml > cn_dicts/zhwiktionary.dict.yaml.tmp
          mv cn_dicts/zhwiktionary.dict.yaml.tmp cn_dicts/zhwiktionary.dict.yaml

      - name: Commit and push if changed
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add cn_dicts/zhwiktionary.dict.yaml
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Sanitize zhwiktionary: remove bare-initial m entries"
            git push
          fi
