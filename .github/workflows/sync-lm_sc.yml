name: Sync fcitx language model

on:
  schedule:
    - cron: '0 2 1 * *'
  workflow_dispatch:
    inputs:
      arpa_date:
        description: 'Force lm_sc.arpa date suffix, e.g. 20260629 (leave empty to auto-detect latest)'
        required: false
        default: ''
        type: string

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout current repo
        uses: actions/checkout@v7

      - name: Resolve target arpa date
        id: resolve
        run: |
          set -euo pipefail
          forced="${{ github.event.inputs.arpa_date }}"
          if [ -n "$forced" ]; then
            remote_date="$forced"
          else
            remote_date=$(curl -fsSL https://download.fcitx-im.org/data/ \
              | grep -oE 'lm_sc\.arpa-[0-9]{8}\.tar\.zst' \
              | grep -oE '[0-9]{8}' | sort -n | tail -1)
          fi

          local_date=$(grep '^lm_sc.arpa=' .github/lm_sc.version | cut -d= -f2 || echo 0)

          if [ -z "$remote_date" ]; then
            echo "failed to resolve arpa date"; exit 1
          fi

          if [ -n "$forced" ] || [ "$remote_date" -gt "$local_date" ]; then
            echo "should_build=true" >> "$GITHUB_OUTPUT"
          else
            echo "should_build=false" >> "$GITHUB_OUTPUT"
          fi
          echo "arpa_date=$remote_date" >> "$GITHUB_OUTPUT"

      - name: Install dependencies
        if: steps.resolve.outputs.should_build == 'true'
        run: |
          sudo apt-get update
          sudo apt-get install -y librime1 python3 wget zstd

      - name: Checkout rime-build-grammar tools
        if: steps.resolve.outputs.should_build == 'true'
        uses: actions/checkout@v7
        with:
          repository: gaboolic/rime-build-grammar
          path: rime-build-grammar

      - name: Build lm_sc.gram
        if: steps.resolve.outputs.should_build == 'true'
        run: |
          set -euo pipefail
          arpa_date="${{ steps.resolve.outputs.arpa_date }}"
          wget "https://download.fcitx-im.org/data/lm_sc.arpa-${arpa_date}.tar.zst" -O lm_sc.arpa.tar.zst
          zstd -d lm_sc.arpa.tar.zst -o lm_sc.arpa.tar
          tar -xf lm_sc.arpa.tar
          python3 rime-build-grammar/arpa.py lm_sc.arpa --output-dir output
          python3 rime-build-grammar/merge_ngram.py --input-dir output --orders 2 3
          chmod +x rime-build-grammar/build_grammar.linux
          rime-build-grammar/build_grammar.linux lm_sc < output/merge_2_3.txt
          rm -rf rime-build-grammar output lm_sc.arpa lm_sc.arpa.tar lm_sc.arpa.tar.zst
          sed -i -E "s/^lm_sc.arpa=.*/lm_sc.arpa=${arpa_date}/" .github/lm_sc.version

      - name: Commit and push changes
        if: steps.resolve.outputs.should_build == 'true'
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add lm_sc.gram .github/lm_sc.version
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "build: update lm_sc.gram (${{ steps.resolve.outputs.arpa_date }})"
            git push
          fi
