name: Sync dictionaries and input schemas

on:
  schedule:
    - cron: '30 0 * * 0'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: sync-dicts-and-schemas
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout rime-frost
        uses: actions/checkout@v7
        with:
          repository: gaboolic/rime-frost
          ref: master
          path: frost

      - name: Checkout rime-ice
        uses: actions/checkout@v7
        with:
          repository: iDvel/rime-ice
          path: ice

      - name: Checkout target repo
        uses: actions/checkout@v7
        with:
          path: target
          persist-credentials: true
          fetch-depth: 0

      - name: Sync Chinese dictionaries from rime-frost
        run: |
          set -euo pipefail
          rsync -av \
            frost/cn_dicts/8105.dict.yaml \
            frost/cn_dicts/41448.dict.yaml \
            frost/cn_dicts/base.dict.yaml \
            target/cn_dicts/

      - name: Sync zhwiki / zhwiktionary
        run: |
          set -euo pipefail

          api=$(curl -fsSL \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            https://api.github.com/repos/felixonmars/fcitx5-pinyin-zhwiki/releases/latest)

          update_dict() {
            local name=$1
            local file="target/cn_dicts/${name}.dict.yaml"
            local remote local_ver url

            remote=$(printf '%s\n' "$api" \
              | grep -oE "\"browser_download_url\": \"[^\"]*${name}-[0-9]{8}\.dict\.yaml\"" \
              | grep -oE '[0-9]{8}' \
              | sort -u \
              | tail -1)

            [ -z "$remote" ] && return

            local_ver=$(grep -oE '^version: *"[0-9]{8}"' "$file" | grep -oE '[0-9]{8}' || echo 0)
            echo "$name: local=$local_ver remote=$remote"

            if [ "$remote" -gt "$local_ver" ]; then
              url=$(printf '%s\n' "$api" \
                | grep -oE "\"browser_download_url\": \"[^\"]*${name}-${remote}\.dict\.yaml\"" \
                | head -1 \
                | cut -d'"' -f4)
              curl -fsSL -o "$file" "$url"
              sed -i -E "s/^version: *\"[^\"]*\"/version: \"${remote}\"/" "$file"
            fi
          }

          update_dict zhwiki
          update_dict zhwiktionary

      - name: Sanitize zhwiktionary
        run: |
          set -euo pipefail
          awk -F'\t' '
            BEGIN { in_body = 0 }
            !in_body {
              print
              if ($0 == "...") in_body = 1
              next
            }
            NF < 2 { print; next }
            $2 ~ /^m([[:space:]]|$)/ { next }
            { print }
          ' target/cn_dicts/zhwiktionary.dict.yaml > target/cn_dicts/zhwiktionary.dict.yaml.tmp
          mv target/cn_dicts/zhwiktionary.dict.yaml.tmp target/cn_dicts/zhwiktionary.dict.yaml

      - name: Sync custom dictionaries
        run: |
          set -euo pipefail
          curl -fsSL -o target/cn_dicts/yuanshen.dict.yaml https://github.com/qvshuo/rime-luna-pinyin-custom-dict/releases/download/yuanshen/yuanshen.dict.yaml
          curl -fsSL -o target/cn_dicts/buzzwords.dict.yaml https://github.com/qvshuo/rime-luna-pinyin-custom-dict/releases/download/buzzwords/buzzwords.dict.yaml

      - name: Sync English input schema from rime-ice
        run: |
          set -euo pipefail
          rsync -av ice/melt_eng.dict.yaml target/
          rsync -av ice/en_dicts/en.dict.yaml target/en_dicts/
          rsync -av ice/en_dicts/en_ext.dict.yaml target/en_dicts/
          rsync -av ice/lua/reduce_english_filter.lua target/lua/

      - name: Sync Japanese input schema
        run: |
          set -euo pipefail
          cd target
          export rime_dir=.
          curl -fsSL https://raw.githubusercontent.com/rime/plum/master/rime-install | bash -s -- gkovacs/rime-japanese
          rm -rf plum

      - name: Commit and push changes
        run: |
          set -euo pipefail
          cd target
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add .
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Sync dictionaries and input schemas"
            git push origin HEAD:${{ github.ref_name }}
          fi
